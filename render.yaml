services:
  # URL becomes https://<name>.onrender.com  — change `name` to rename the link
  - type: web
    name: unified-model-approach-3-foundry
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: MAGICA_API_KEY
        sync: false          # set this in the Render dashboard (kept secret)
